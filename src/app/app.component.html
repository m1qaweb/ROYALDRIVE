<div id="fullpage">
  <div class="section" id="section1">
    <app-header></app-header>
    <app-background-video></app-background-video>
    <div class="hero-text">
      Luxury rentals, delivered with impeccable service.
    </div>
    <app-lottie-animation></app-lottie-animation>
    <div class="scroll-down">SCROLL DOWN</div>
  </div>
  <img src="assets/images/main-bg.mp4" alt="" />
  <div class="section" id="section2">
    <div class="title-2">
      <h2>Our Vehicles</h2>
    </div>
    <div class="container">
      <div class="carousel">
        <div class="carousel-inner">
          <div
            *ngFor="let item of carouselItems; let i = index"
            class="carousel-item"
            [class.active]="i === currentSlide"
          >
            <div class="card">
              <img [src]="item.image" alt="{{ item.brand }}" />
              <div class="card-content">
                <h3>{{ item.brand }}</h3>
                <p>{{ item.price }}</p>
              </div>
              <div class="card-footer">
                <button class="btn btn-primary">View Details</button>
                <button class="btn btn-secondary">Book Now</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="section" id="section3">
    <img src="" alt="audi" />
  </div>
</div>
<div class="indicators">
  <div class="indicator" id="Home"></div>
  <div class="indicator" id="Vehicles"></div>
  <div class="indicator" id="AUDI"></div>
</div>

<app-footer></app-footer>
